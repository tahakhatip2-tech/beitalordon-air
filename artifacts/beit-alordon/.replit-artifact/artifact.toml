kind = "web"
previewPath = "/"
title = "بيت الأردن للتكييف المركزي"
version = "1.0.0"
id = "artifacts/beit-alordon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23714

[services.development]
run = "pnpm --filter @workspace/beit-alordon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beit-alordon", "run", "build" ]
publicDir = "artifacts/beit-alordon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23714"
BASE_PATH = "/"
